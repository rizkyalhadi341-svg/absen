    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      getDoc,
      getDocs,
      updateDoc,
      deleteDoc,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAo0CzlXq3fNT1sOC6udPAttghYn1WtvRQ",
      authDomain: "absensiosissmkspa-57810.firebaseapp.com",
      projectId: "absensiosissmkspa-57810",
      storageBucket: "absensiosissmkspa-57810.firebasestorage.app",
      messagingSenderId: "88513225826",
      appId: "1:88513225826:web:af704ab0f97bd9442c9d3b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Expose to global scope
    window.db = db;
    window.collection = collection;
    window.doc = doc;
    window.setDoc = setDoc;
    window.getDoc = getDoc;
    window.getDocs = getDocs;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.query = query;
    window.where = where;
  </script>

  <div class="container mt-5">
    <div style="display: flex; justify-content: center;">
      <div style="width: 100%; max-width: 900px;">
        <div class="card shadow-lg">
          <div class="card-header" style="background: linear-gradient(135deg, #1e90ff 0%, #0066cc 100%); color: white;">
            <h4 style="margin: 0;">📊 Rekapan Absensi OSIS</h4>
          </div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-3">
                <label class="form-label" style="font-weight: 600;">Dari Tanggal</label>
                <input type="date" id="startDate" class="form-control" value="">
              </div>
              <div class="col-md-3">
                <label class="form-label" style="font-weight: 600;">Sampai Tanggal</label>
                <input type="date" id="endDate" class="form-control" value="">
              </div>
              <div class="col-md-3" style="display: flex; align-items: flex-end;">
                <button class="btn btn-primary" onclick="filterRecap()" style="width: 100%;">🔍 Filter</button>
              </div>
              <div class="col-md-3" style="display: flex; align-items: flex-end;">
                <button class="btn btn-success" onclick="printRecap()" style="width: 100%;">🖨️ Cetak</button>
              </div>
            </div>

            <div class="table-responsive mt-4">
              <table class="table table-striped">
                <thead class="table-dark">
                  <tr>
                    <th>#</th>
                    <th>Nama Anggota</th>
                    <th>Posisi</th>
                    <th class="text-success">✓ Hadir</th>
                    <th class="text-warning">⏱ Telat</th>
                    <th class="text-danger">✗ Tidak Hadir</th>
                    <th>Total</th>
                    <th>Presentase</th>
                  </tr>
                </thead>
                <tbody id="recapTable">
                  <tr>
                    <td colspan="7" class="text-center text-muted">Memuat...</td>
                  </tr>
                </tbody>
              </table>
            </div>

            <div class="mt-3">
              <a href="recap-detail.html" class="btn btn-info">📈 Lihat Detail Lengkap</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="alertContainer"></div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    const today = App.getTodayDate();
    
    // Set default dates
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;

    async function loadRecap() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      const summary = await Storage.getAttendanceSummary(startDate, endDate);
      const table = document.getElementById('recapTable');

      if (summary.length === 0) {
        table.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Belum ada data absensi</td></tr>';
        return;
      }

      let html = '';
      summary.forEach((item, index) => {
        const total = item.totalAttendance || 0;
        const hadir = item.hadir || 0;
        const presentase = total > 0 ? Math.round((hadir / total) * 100) : 0;

        html += `<tr>
          <td>${index + 1}</td>
          <td><strong>${item.name}</strong></td>
          <td><span class="badge badge-secondary">${item.position || 'Anggota'}</span></td>
          <td><span class="badge badge-success">${item.hadir || 0}</span></td>
          <td><span class="badge badge-warning">${item.telat || 0}</span></td>
          <td><span class="badge badge-danger">${item.tidakHadir || 0}</span></td>
          <td>${item.totalAttendance || 0}</td>
          <td>
            <div class="progress" style="height: 20px;">
              <div class="progress-bar" style="width: ${presentase}%">
                ${presentase}%
              </div>
            </div>
          </td>
        </tr>`;
      });

      table.innerHTML = html;
    }

    function filterRecap() {
      loadRecap();
    }

    function printRecap() {
      window.print();
    }

    async function initApp() {
      await Storage.ready;
      loadRecap();
    }

    // Initialize
    initApp();
  </script>
  <footer style="text-align: center; padding: 1rem; font-size: 0.8rem; color: #666;">by: alhadi</footer>
</body>
</html>
