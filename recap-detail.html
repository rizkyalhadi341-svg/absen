    // Import Firebase config
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      doc,
      setDoc,
      getDoc,
      getDocs,
      updateDoc,
      deleteDoc,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAo0CzlXq3fNT1sOC6udPAttghYn1WtvRQ",
      authDomain: "absensiosissmkspa-57810.firebaseapp.com",
      projectId: "absensiosissmkspa-57810",
      storageBucket: "absensiosissmkspa-57810.firebasestorage.app",
      messagingSenderId: "88513225826",
      appId: "1:88513225826:web:af704ab0f97bd9442c9d3b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Expose to global scope
    window.db = db;
    window.collection = collection;
    window.doc = doc;
    window.setDoc = setDoc;
    window.getDoc = getDoc;
    window.getDocs = getDocs;
    window.updateDoc = updateDoc;
    window.deleteDoc = deleteDoc;
    window.query = query;
    window.where = where;
  </script>
</head>
<body>

          <span></span>

        <div class="nav-links" style="gap: 1rem;">
          <a href="index.html" style="color: white; text-decoration: none; font-weight: 500;">Absensi</a>

        <a href="profil-osis.html">Profil OSIS</a>
        <a href="admin-login.html">Admin</a>
      </aside>
    </div>
  </nav>

  <div class="container mt-5">
    <div style="display: flex; justify-content: center;">
      <div style="width: 100%; max-width: 1000px;">
        <div class="card shadow-lg">
          <div class="card-header" style="background: #0066cc; color: white;">
            <h4 style="margin: 0;">📊 Detail Rekapan Absensi OSIS</h4>
          </div>
          <div class="card-body">
            <div class="row">
              <div class="col-md-3">
                <label class="form-label" style="font-weight: 600;">Dari Tanggal</label>
                <input type="date" id="startDate" class="form-control" value="">
              </div>
              <div class="col-md-3">
                <label class="form-label" style="font-weight: 600;">Sampai Tanggal</label>
                <input type="date" id="endDate" class="form-control" value="">
              </div>
              <div class="col-md-3" style="display: flex; align-items: flex-end;">
                <button class="btn btn-primary" onclick="filterDetail()" style="width: 100%;">🔍 Filter</button>
              </div>
              <div class="col-md-3" style="display: flex; align-items: flex-end;">
                <button class="btn btn-success" onclick="printDetail()" style="width: 100%;">🖨️ Cetak</button>
              </div>
            </div>

            <div id="detailContainer" class="mt-4"></div>

            <div class="mt-3">
              <a href="recap.html" class="btn btn-secondary">← Kembali ke Rekapan</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="alertContainer"></div>

  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script>
    const today = App.getTodayDate();
    
    // Set default dates
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;

    async function loadDetail() {
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;

      const details = await Storage.getDetailedRecap(startDate, endDate);
      const container = document.getElementById('detailContainer');

      if (details.length === 0) {
        container.innerHTML = '<p class="text-center text-muted">Belum ada data absensi</p>';
        return;
      }

      let html = '';
      details.forEach((member, index) => {
        const records = member.records || [];
        const recordsHtml = records.length === 0 
          ? '<p class="text-muted">Belum ada data absensi</p>'
          : '<div style="display: flex; flex-wrap: wrap; gap: 0.5rem;">' +
            records.map(record => {
              const badgeClass = record.status === 'hadir' ? 'success' : 'warning';
              const statusText = record.status === 'hadir' ? 'Hadir' : 'Telat';
              return `<span class="badge badge-${badgeClass}">
                ${App.formatDateShort(record.date)}: ${statusText}
              </span>`;
            }).join('') + '</div>';

        html += `<div class="card mb-3">
          <div class="card-header" style="background: #f8f9fa;">
            <h6 style="margin: 0;"><strong>${index + 1}. ${member.name}</strong></h6>
          </div>
          <div class="card-body">
            ${recordsHtml}
          </div>
        </div>`;
      });

      container.innerHTML = html;
    }

    function filterDetail() {
      loadDetail();
    }

    function printDetail() {
      window.print();
    }

    async function initApp() {
      await Storage.ready;
      loadDetail();
    }

    // Initialize
    initApp();
  </script>
  <footer style="text-align: center; padding: 1rem; font-size: 0.8rem; color: #666;">by: alhadi</footer>
</body>
</html>
